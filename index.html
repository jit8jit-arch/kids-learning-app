<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kids Learning World</title>
    
    <link rel="icon" type="image/png" href="/kids-learning-app/icon-192.png">
    <link rel="apple-touch-icon" href="/kids-learning-app/icon-192.png">
    <link rel="manifest" href="/kids-learning-app/manifest.json">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #FF5A5F; --secondary: #087E8B;
            --accent: #FFCA3A; --bg: #F4F1DE; --text: #333;
        }
        body {
            margin: 0; padding: 0; background-color: var(--bg);
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            overflow: hidden; touch-action: none; user-select: none;
        }
        .screen { display: none; flex-direction: column; align-items: center; height: 100vh; width: 100vw; }
        .active-screen { display: flex; }
        
        /* Premium Header */
        .header {
            width: 100%; padding: 15px 20px; background: linear-gradient(135deg, var(--secondary), #0b9b9b);
            color: white; display: flex; justify-content: space-between; align-items: center;
            box-sizing: border-box; font-size: 24px; font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; z-index: 10;
        }
        .icon-btn {
            background: var(--accent); border: none; color: #333; padding: 10px 20px;
            border-radius: 15px; font-size: 20px; font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 0 #dca71b; transition: all 0.1s; display: flex; align-items: center; gap: 5px;
        }
        .icon-btn:active { transform: translateY(5px); box-shadow: 0 0px 0 #dca71b; }
        
        /* Mega Menu Hub */
        h1 { color: var(--primary); text-shadow: 3px 3px 0px #fff; font-size: 42px; text-align: center; margin: 30px 0 20px 0; line-height: 1.1; }
        .menu-container { width: 90%; max-width: 500px; height: 75vh; overflow-y: auto; padding-bottom: 30px; }
        
        .category-title { font-size: 24px; color: var(--secondary); border-bottom: 3px dashed var(--accent); margin-top: 20px; margin-bottom: 15px; padding-bottom: 5px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .menu-btn { 
            padding: 15px 10px; font-size: 20px; background: white; color: var(--text); 
            border: 4px solid var(--secondary); box-shadow: 0 6px 0 var(--secondary); 
            border-radius: 20px; font-weight: bold; display: flex; flex-direction: column; 
            align-items: center; gap: 10px; transition: transform 0.1s;
        }
        .menu-btn:active { transform: translateY(6px); box-shadow: 0 0px 0 var(--secondary); }
        .menu-icon { font-size: 40px; }
        
        /* Tracing Game */
        .canvas-container {
            margin-top: 25px; position: relative; width: 90%; max-width: 500px; height: 60%;
            background: white; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 5px solid white; overflow: hidden;
            background-image: linear-gradient(#e5e5e5 2px, transparent 2px); background-size: 100% 3em; 
        }
        canvas { width: 100%; height: 100%; display: block; }
        
        /* Sorting Game */
        #sorting-area { flex: 1; width: 100%; position: relative; display: flex; flex-direction: column; align-items: center; }
        .drop-zones { display: flex; justify-content: space-around; width: 95%; height: 35%; margin-top: 20px; }
        .zone {
            width: 45%; border-radius: 25px; border: 5px dashed white; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; font-size: 28px; font-weight: bold; 
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.1), 0 5px 15px rgba(0,0,0,0.1);
        }
        #zone-fruits { background: linear-gradient(180deg, #ffdde1, #ff9a9e); color: #c0392b; text-shadow: 1px 1px 0 #fff; }
        #zone-animals { background: linear-gradient(180deg, #e0f2f1, #80cbc4); color: #00695c; text-shadow: 1px 1px 0 #fff; }
        
        .sort-item {
            position: absolute; font-size: 60px; cursor: grab; padding: 10px;
            filter: drop-shadow(0 8px 8px rgba(0,0,0,0.25)); transition: transform 0.1s;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, float 3s ease-in-out 0.5s infinite;
        }
        
        /* Jigsaw Puzzle Game */
        #jigsaw-area { flex: 1; width: 100%; position: relative; display: flex; flex-direction: column; align-items: center; padding-top: 30px; }
        .jigsaw-board {
            width: 300px; height: 300px; background-color: rgba(255,255,255,0.5); border: 8px solid var(--secondary);
            border-radius: 15px; box-shadow: inset 0 0 20px rgba(0,0,0,0.1); position: relative;
            background-size: cover; background-position: center; background-blend-mode: lighten; opacity: 0.9;
        }
        .jigsaw-board::after { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 4px; background: rgba(8, 126, 139, 0.3); border-radius: 2px; }
        .jigsaw-board::before { content: ''; position: absolute; left: 50%; top: 0; bottom: 0; width: 4px; background: rgba(8, 126, 139, 0.3); border-radius: 2px; }
        
        .jigsaw-piece {
            position: absolute; width: 150px; height: 150px; background-size: 300px 300px;
            border-radius: 10px; box-shadow: 0 10px 15px rgba(0,0,0,0.3); border: 3px solid white;
            cursor: grab; transition: transform 0.1s; z-index: 5;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        
        .success-pulse { animation: successGlow 0.6s ease-out forwards !important; }

        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        @keyframes successGlow {
            0% { transform: scale(1); filter: drop-shadow(0 0 0px gold); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 25px gold); z-index: 20; }
            100% { transform: scale(1); filter: drop-shadow(0 4px 4px rgba(0,0,0,0.2)); }
        }
        
        .status-msg { font-size: 32px; font-weight: bold; color: var(--primary); margin-top: 15px; text-shadow: 2px 2px 0 #fff; text-align: center;}
    </style>
</head>
<body>

    <div id="menu-screen" class="screen active-screen">
        <h1>Kids Learning Hub 🌟</h1>
        <div class="menu-container" id="menu-container">
            </div>
    </div>

    <div id="tracing-screen" class="screen">
        <div class="header">
            <button class="icon-btn" onclick="showMenu()">🏠</button>
            <span id="tracing-title">Learn to Write</span>
            <button class="icon-btn" onclick="resetSection()">🔄</button>
        </div>
        <div class="canvas-container"><canvas id="drawingCanvas"></canvas></div>
        <div id="tracing-msg" class="status-msg"></div>
    </div>

    <div id="sorting-screen" class="screen">
        <div class="header">
            <button class="icon-btn" onclick="showMenu()">🏠</button>
            <span>Sort Items!</span>
            <button class="icon-btn" onclick="startSorting()">🔄</button>
        </div>
        <div id="sorting-area">
            <div class="drop-zones">
                <div id="zone-fruits" class="zone">🍎 Fruits</div>
                <div id="zone-animals" class="zone">🐶 Animals</div>
            </div>
        </div>
        <div id="sorting-msg" class="status-msg"></div>
    </div>

    <div id="jigsaw-screen" class="screen">
        <div class="header">
            <button class="icon-btn" onclick="showMenu()">🏠</button>
            <span id="jigsaw-title">Picture Puzzle</span>
            <button class="icon-btn" onclick="startJigsaw()">🔄</button>
        </div>
        <div id="jigsaw-area">
            <div class="jigsaw-board" id="jigsaw-board"></div>
            </div>
        <div id="jigsaw-msg" class="status-msg"></div>
    </div>

    <script src="/kids-learning-app/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/kids-learning-app/sw.js', { scope: '/kids-learning-app/' })
            .then(() => console.log("Service Worker Registered Successfully!"))
            .catch((err) => console.error("Service Worker Failed:", err));
        }
    </script>
</body>
</html>
