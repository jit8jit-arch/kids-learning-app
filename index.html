<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kids Learning World</title>
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #FF5A5F;
            --secondary: #087E8B;
            --accent: #F9A03F;
            --bg: #F5F5F5;
        }
        body {
            margin: 0; padding: 0; background-color: var(--bg);
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            overflow: hidden; touch-action: none; user-select: none;
        }
        /* Layouts */
        .screen { display: none; flex-direction: column; align-items: center; height: 100vh; width: 100vw; }
        .active-screen { display: flex; }
        
        /* Header */
        .header {
            width: 100%; padding: 15px; background: var(--secondary); color: white;
            display: flex; justify-content: space-between; align-items: center;
            box-sizing: border-box; font-size: 24px; font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button {
            background: var(--accent); border: none; color: white; padding: 10px 20px;
            border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 0 #C77A2B;
        }
        button:active { transform: translateY(4px); box-shadow: none; }
        
        /* Menu Grid */
        h1 { color: var(--primary); text-shadow: 2px 2px #fff; font-size: 36px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 15px; width: 90%; max-width: 400px; }
        .menu-btn { padding: 20px; font-size: 22px; background: var(--primary); box-shadow: 0 4px 0 #C43B40; }
        
        /* Tracing Canvas */
        canvas {
            margin-top: 20px; background-color: white; border-radius: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1); border: 4px solid var(--secondary);
        }
        
        /* Sorting Game */
        #sorting-area {
            flex: 1; width: 100%; position: relative; display: flex; flex-direction: column;
        }
        .drop-zones { display: flex; width: 100%; height: 40%; }
        .zone {
            flex: 1; margin: 10px; border-radius: 20px; border: 4px dashed;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 24px; font-weight: bold;
        }
        #zone-fruits { background: #ffebee; border-color: #ffcdd2; color: #c62828; }
        #zone-animals { background: #e8f5e9; border-color: #c8e6c9; color: #2e7d32; }
        .draggable {
            position: absolute; font-size: 50px; cursor: grab; padding: 10px;
            transition: transform 0.2s;
        }
        
        .status-msg { font-size: 28px; font-weight: bold; color: var(--primary); margin-top: 10px; height: 40px; }
        .finished-badge { background: #4CAF50; color: white; padding: 5px 10px; border-radius: 10px; font-size: 14px; margin-left: 10px; }
    </style>
</head>
<body>

    <div id="menu-screen" class="screen active-screen">
        <h1>Kids Learning World 🌟</h1>
        <div class="grid" id="menu-grid">
            </div>
    </div>

    <div id="tracing-screen" class="screen">
        <div class="header">
            <button onclick="showMenu()">🏠 Back</button>
            <span id="tracing-title">A-E</span>
            <button onclick="resetSection()">🔄 Reset</button>
        </div>
        <canvas id="drawingCanvas"></canvas>
        <div id="tracing-msg" class="status-msg"></div>
    </div>

    <div id="sorting-screen" class="screen">
        <div class="header">
            <button onclick="showMenu()">🏠 Back</button>
            <span>Sort Items!</span>
            <button onclick="startSorting()">🔄 Reset</button>
        </div>
        <div id="sorting-area">
            <div class="drop-zones">
                <div id="zone-fruits" class="zone">🍎 Fruits</div>
                <div id="zone-animals" class="zone">🐶 Animals</div>
            </div>
            </div>
        <div id="sorting-msg" class="status-msg"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
